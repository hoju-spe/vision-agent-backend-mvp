services:
  vision-agent-api:
    build: .
    container_name: vision-agent-backend-mvp
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/vision_agent.db
      UPLOAD_DIR: ./data/uploads
      RESULT_DIR: ./data/results
      YOLO_MODEL_NAME: yolov8n.pt
      CONFIDENCE_THRESHOLD: "0.35"
    volumes:
      - ./data:/app/data
